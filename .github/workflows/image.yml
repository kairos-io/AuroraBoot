---
name: 'Release images'

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ci-image-${{ github.head_ref || github.ref }}-${{ github.repository }}
  cancel-in-progress: false # we never want to cancel a running job on release
jobs:
  build-ui:
    # Build UI on amd64 for riscv64 - QEMU emulation of amd64 on riscv64 is unstable
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build
      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist
          retention-days: 1
  build-linux-amd64:
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build
        uses: docker/build-push-action@v6
        with:
          build-args: |
            VERSION=${{ github.ref_name }}
          provenance: false
          platforms: linux/amd64
          push: true
          tags: quay.io/kairos/auroraboot:${{ github.ref_name }}-amd64
  build-linux-arm64:
    runs-on: 'ubuntu-24.04-arm'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build
        uses: docker/build-push-action@v6
        with:
          build-args: |
            VERSION=${{ github.ref_name }}
          provenance: false
          platforms: linux/arm64
          push: true
          tags: quay.io/kairos/auroraboot:${{ github.ref_name }}-arm64
  build-linux-riscv64:
    runs-on: 'ubuntu-24.04-riscv'
    needs: build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/ui/dist
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.riscv64
          build-args: |
            VERSION=${{ github.ref_name }}
          provenance: false
          platforms: linux/riscv64
          push: true
          tags: quay.io/kairos/auroraboot:${{ github.ref_name }}-riscv64
  build:
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-riscv64
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: quay.io/kairos/auroraboot
      - uses: int128/docker-manifest-create-action@v2
        id: build
        with:
          index-annotations: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          sources: |
            quay.io/kairos/auroraboot:${{ github.ref_name }}-amd64
            quay.io/kairos/auroraboot:${{ github.ref_name }}-arm64
            quay.io/kairos/auroraboot:${{ github.ref_name }}-riscv64
