---
name: 'Test RISC-V build'

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ui:
    # Build UI on amd64 - mirrors image.yml release workflow
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build
      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: internal/ui/dist
          retention-days: 1

  build-linux-riscv64:
    runs-on: 'ubuntu-24.04-riscv'
    needs: build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download UI artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: internal/ui/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          go build -v -o auroraboot .

      - name: Run tests
        run: |
          # Skip e2e and integration tests - they require Docker images or have timing
          # issues on slower riscv64 runners
          go test -v $(go list ./... | grep -v -E '/(e2e|integration)')

      - name: Show binary info
        run: |
          file auroraboot
          ./auroraboot --version || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker image build for riscv64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.riscv64
          platforms: linux/riscv64
          push: false
          load: false
